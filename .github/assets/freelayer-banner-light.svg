<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 250" width="1200" height="250" role="img" aria-label="FreeLayer — private communication without a central server">
  <defs>
    <radialGradient id="glow" cx="0.28" cy="0.5" r="0.75">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0d9488" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="250" fill="none"/>
  <rect width="1200" height="250" fill="url(#glow)"/>

  <!-- Sealed capsule mark -->
  <g transform="translate(120,53)">
    <rect x="0" y="0" width="150" height="144" rx="72" fill="none" stroke="url(#cap)" stroke-width="7"/>
    <!-- envelope -->
    <rect x="36" y="47" width="78" height="52" rx="9" fill="none" stroke="#0f766e" stroke-width="5.5"/>
    <path d="M 39 52 L 75 78 L 111 52" fill="none" stroke="#0f766e" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- seal -->
    <circle cx="114" cy="99" r="13" fill="#0d9488"/>
    <circle cx="114" cy="99" r="5" fill="#ffffff"/>
  </g>

  <!-- Wordmark -->
  <g font-family="system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="330" y="122" font-size="76" font-weight="750" letter-spacing="-1.5" fill="#1a1d21">Free<tspan fill="#0d9488">Layer</tspan></text>
    <!-- textLength pins the tagline to an exact width so it can never
         overflow the canvas, whatever font the viewer's system renders. -->
    <text x="332" y="170" font-size="21" font-weight="500" fill="#5c6570" textLength="730" lengthAdjust="spacing">PRIVATE COMMUNICATION WITHOUT A CENTRAL SERVER</text>
  </g>

  <!-- courier dots: capsule travelling any path -->
  <g fill="#0d9488">
    <circle cx="336" cy="202" r="3.5" opacity="0.9"/>
    <circle cx="366" cy="202" r="3.5" opacity="0.65"/>
    <circle cx="396" cy="202" r="3.5" opacity="0.45"/>
    <circle cx="426" cy="202" r="3.5" opacity="0.3"/>
    <circle cx="456" cy="202" r="3.5" opacity="0.18"/>
  </g>
</svg>
