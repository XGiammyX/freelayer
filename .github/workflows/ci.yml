name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Import boundaries (anti-bypass baseline)
        run: pnpm check:boundaries

      - name: No external assets
        run: pnpm check:no-external-assets

      - name: No telemetry
        run: pnpm check:no-telemetry

      - name: No forbidden storage APIs
        run: pnpm check:no-forbidden-storage

      - name: Privacy audit (aggregated guards)
        run: pnpm audit:privacy

      # Future steps (see docs/TRUST_CENTER.md):
      # - coverage upload and threshold enforcement (80%+)
      # - dedicated security-regression suite (Phase 10)
      # - SBOM generation
