name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest
    steps:
      # Actions pinned by commit SHA (supply-chain hardening); version noted in comment.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Import boundaries (anti-bypass baseline)
        run: pnpm check:boundaries

      - name: No external assets
        run: pnpm check:no-external-assets

      - name: No telemetry
        run: pnpm check:no-telemetry

      - name: No forbidden storage APIs
        run: pnpm check:no-forbidden-storage

      - name: No forbidden network APIs
        run: pnpm check:no-forbidden-network

      - name: No network-client dependencies
        run: pnpm check:no-network-deps

      - name: No metadata-bypass (Metadata Firewall)
        run: pnpm check:no-metadata-bypass

      - name: Build artifact zero-egress (after build)
        run: pnpm check:build-zero-egress

      - name: Documentation link integrity
        run: pnpm check:doc-links

      - name: Privacy audit (aggregated guards)
        run: pnpm audit:privacy

      # Future steps (see docs/TRUST_CENTER.md):
      # - coverage upload and threshold enforcement (80%+)
      # - dedicated security-regression suite (Phase 10)
      # - SBOM generation
