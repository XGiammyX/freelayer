name: Dependency review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    name: Review dependency changes
    runs-on: ubuntu-latest
    steps:
      # Actions pinned by commit SHA (supply-chain hardening); version noted in comment.
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5
        with:
          # Block known-vulnerable dependencies at moderate+ severity.
          fail-on-severity: moderate
          comment-summary-in-pr: on-failure
          # TODO: define the AGPL-compatible dependency allowlist (project is
          # AGPL-3.0-or-later — see LICENSE and docs/adr/ADR-0011). Example:
          # allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, ISC

      # Future (see docs/PBOM.md — supply chain):
      # - install-script detection for new dependencies
      # - maintainer-count / provenance heuristics
      # - SBOM diff against the previous release
